<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21 de Mayo · Jueves</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Oswald:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    font-family: 'Crimson Pro', serif;
  }

  .card {
    width: 420px;
    background: #faf6ed;
    color: #111;
  }

  .border-top {
    height: 6px;
    background: #111;
    position: relative;
  }
  .border-top::after {
    content: '';
    display: block;
    height: 2px;
    background: #c9a227;
    margin: 2px 0;
  }

  .header {
    padding: 18px 18px 10px;
    text-align: center;
    border-bottom: 1px solid #c9a227;
  }

  .header-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .nav-arrow {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: #c9a227;
    text-decoration: none;
    padding: 0 4px;
    line-height: 1;
  }

  .nav-arrow:hover {
    color: #111;
  }

  .nav-arrow.hidden {
    visibility: hidden;
    pointer-events: none;
  }

  .month {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 6px;
    color: #111;
    text-transform: uppercase;
  }

  .day-number {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 190px;
    line-height: 0.78;
    color: #111;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.08);
    margin: -36px 0 36px;
  }

  .weekday {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 5px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .divider {
    height: 1px;
    background: #c9a227;
    margin: 0 18px;
  }

  .section {
    padding: 12px 18px;
    border-bottom: 1px solid #c9a227;
  }

  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #707070;
    margin-bottom: 8px;
  }

  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
  }

  .data-item {
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    color: #111;
  }

  .data-item span {
    color: #707070;
    font-size: 13px;
    display: block;
    font-style: italic;
  }

  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    color: #111;
    margin-bottom: 4px;
  }

  .data-row span {
    color: #707070;
    font-size: 13px;
    font-style: italic;
  }

  .astro-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
  }

  .astro-col .section-label {
    margin-bottom: 6px;
  }

  .year-progress {
    padding: 12px 18px;
    border-bottom: 1px solid #c9a227;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #707070;
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 4px;
    background: #e0d8c8;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #c9a227;
    border-radius: 2px;
    width: 38.36%;
  }

  .saints {
    padding: 12px 18px;
    border-bottom: 1px solid #c9a227;
    text-align: center;
  }

  .saints-header {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: #707070;
    margin-bottom: 8px;
  }

  .saints-names {
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    font-weight: 600;
    color: #111;
    line-height: 1.6;
  }

  .quote {
    padding: 14px 18px;
    border-bottom: 1px solid #c9a227;
    text-align: center;
  }

  .quote-text {
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    font-style: italic;
    color: #333;
    line-height: 1.6;

  .quote-author {

    font-size: 10px;
    letter-spacing: 2px;
    color: #707070;
    text-transform: uppercase;
  }

  .footer {
    background: #111;
    padding: 20px 2px;
    text-align: center;
  }

  .buenos-dias {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 26px;
    color: #c9a227;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .international-days {
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    color: #e9c67b;
    line-height: 1.7;
    font-style: italic;
  }

  .border-bottom-deco {
    height: 6px;
    background: #111;
    position: relative;
  }
  .border-bottom-deco::before {
    content: '';
    display: block;
    height: 2px;
    background: #c9a227;
    margin: 2px 0;
  }

<div class="card">

    </div>
    <div class="day-number">21</div>

  </div>

</div>
